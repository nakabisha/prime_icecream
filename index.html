<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Training</title>
    <style>
        :root {
            --bg-color: #1a1a1a; /* 目に優しいダークモード */
            --card-bg: #2d2d2d;
            --primary: #4dabf7;
            --accent: #ff922b;
            --text: #ffffff;
        }
        * { touch-action: manipulation; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: env(safe-area-inset-top) 10px env(safe-area-inset-bottom);
            color: var(--text);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            -webkit-user-select: none;
        }
        /* 設定エリア：よりコンパクトに */
        .controls {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 8px;
            padding: 10px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 0 0 15px 15px;
        }
        .control-group { display: flex; align-items: center; gap: 4px; font-size: 12px; }
        input, select {
            background: #333;
            color: white;
            border: 1px solid #444;
            border-radius: 4px;
            padding: 4px 6px;
            font-size: 14px;
        }
        input[type="number"] { width: 45px; }
        button {
            padding: 8px 20px;
            cursor: pointer;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 20px;
            font-size: 14px;
            font-weight: bold;
            transition: transform 0.1s;
        }
        button:active { transform: scale(0.95); }
        #start_btn.running { background: #fa5252; }

        /* 数字表示エリア：画面の主役 */
        #display-area {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 5rem;
            font-weight: 800;
            text-shadow: 0 4px 10px rgba(0,0,0,0.3);
            cursor: pointer;
        }
        /* 回答テーブルの装飾 */
        .ans-table {
            border-collapse: separate;
            border-spacing: 10px;
            margin: auto;
        }
        .ans-table th { font-size: 1.2rem; color: #888; font-weight: normal; }
        .ans-table td { font-size: 3rem; color: var(--accent); border-bottom: 3px solid var(--accent); }

        #log { font-size: 12px; color: #888; margin-top: 5px; min-height: 14px; }
    </style>
</head>
<body>
    <div class="controls">
        <div class="control-group"><select id="mode_val"><option value="number">数字</option><option value="hira">かな</option></select></div>
        <div class="control-group"><label>秒:</label><input type="number" id="timer_val" value="3.0" step="0.1"></div>
        <div class="control-group"><label>数:</label><input type="number" id="kaisuu_val" value="10"></div>
        <div class="control-group"><label>種:</label><input type="number" id="shurui_val" value="4"></div>
        <button id="start_btn">START</button>
    </div>
    <div id="log"></div>
    <div id="display-area">Ready</div>

    <script>
        (function() {
            const SOSUU = [2, 3, 5, 7, 11, 13, 17, 19];
            let isRunning = false;
            let lastNum = null;
            let resolveClick = null;

            const btn = document.getElementById("start_btn");
            const display = document.getElementById("display-area");
            const log = document.getElementById("log");

            function numToHira(n) {
                if (n < 10) return ["", "いち", "に", "さん", "よん", "ご", "ろく", "なな", "はち", "きゅう"][n];
                return n; 
            }

            // 画面タップで次へ進む
            display.addEventListener('pointerdown', (e) => {
                if (resolveClick) {
                    const r = resolveClick;
                    resolveClick = null;
                    r();
                }
            });

            async function start() {
                isRunning = true;
                btn.innerText = "STOP";
                btn.classList.add("running");
                
                const timer = parseFloat(document.getElementById("timer_val").value);
                const kaisuu = parseInt(document.getElementById("kaisuu_val").value);
                const shurui = parseInt(document.getElementById("shurui_val").value);
                const mode = document.getElementById("mode_val").value;

                for (let c = 0; isRunning && (kaisuu === -1 || c < kaisuu); c++) {
                    let num = 1, exps = [];
                    do {
                        num = 1; exps = [];
                        for(let i=0; i<shurui; i++) {
                            let p = Math.floor(Math.random() * 3);
                            exps.push(p);
                            num *= Math.pow(SOSUU[i], p);
                        }
                    } while (num === lastNum || num < 2);
                    lastNum = num;

                    display.style.fontSize = "5rem";
                    display.innerText = (mode === "hira") ? numToHira(num) : num.toLocaleString();
                    log.innerText = kaisuu === -1 ? "Count: " + (c+1) : "Remaining: " + (kaisuu - c);

                    if (timer === 0) await new Promise(r => resolveClick = r);
                    else await new Promise(r => setTimeout(r, timer * 1000));

                    if (!isRunning) break;

                    // 回答表示
                    let h = "<tr>", b = "<tr>";
                    for(let i=0; i<shurui; i++) {
                        h += "<th>" + SOSUU[i] + "</th>";
                        b += "<td>" + exps[i] + "</td>";
                    }
                    display.style.fontSize = "1rem";
                    display.innerHTML = `<table class="ans-table">${h}</tr>${b}</tr></table>`;

                    if (timer === 0) await new Promise(r => resolveClick = r);
                    else await new Promise(r => setTimeout(r, 2000));
                }
                stop();
            }

            function stop() {
                isRunning = false;
                btn.innerText = "START";
                btn.classList.remove("running");
                display.style.fontSize = "3rem";
                display.innerText = "Ready";
                log.innerText = "";
            }

            btn.addEventListener('click', () => {
                if (isRunning) stop();
                else start();
            });
        })();
    </script>
</body>
</html>
