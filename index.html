<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Training</title>
    <style>
        :root {
            --bg: #ffffff;
            --bar-bg: #f8f9fa;
            --primary: #007bff;
            --danger: #dc3545;
            --text: #212529;
            --border: #dee2e6;
        }
        * { touch-action: manipulation; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg);
            margin: 0;
            padding: 0;
            color: var(--text);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            -webkit-user-select: none;
        }

        /* 操作バー：無駄な装飾を排除 */
        .controls {
            background: var(--bar-bg);
            padding: env(safe-area-inset-top) 10px 10px;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            gap: 15px;
            border-bottom: 1px solid var(--border);
            z-index: 10;
        }
        .control-group { display: flex; align-items: center; gap: 6px; font-size: 15px; font-weight: bold; }
        input, select {
            padding: 8px;
            border: 1px solid #ced4da;
            border-radius: 8px;
            font-size: 16px;
            background: #fff;
            outline: none;
        }
        input[type="number"] { width: 55px; }
        
        button {
            padding: 10px 25px;
            cursor: pointer;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: bold;
        }
        button.running { background: var(--danger); }

        /* カウント表示 */
        #log {
            font-size: 14px;
            color: #6c757d;
            padding: 8px;
            text-align: center;
            font-weight: bold;
            min-height: 34px;
        }

        /* メイン表示エリア */
        #display-area {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 8rem;
            font-weight: 900;
            cursor: pointer;
            text-align: center;
            padding: 20px;
        }

        /* 回答表示用テーブル */
        .ans-table { border-collapse: collapse; margin: auto; }
        .ans-table th { font-size: 1.5rem; color: #adb5bd; border: 2px solid var(--border); padding: 8px; background: #fdfdfe; }
        .ans-table td { font-size: 4.5rem; color: var(--primary); border: 2px solid var(--border); padding: 15px 30px; text-align: center; font-weight: bold; }

        @media (max-width: 600px) {
            #display-area { font-size: 5rem; }
            .ans-table td { font-size: 3.5rem; padding: 10px 20px; }
            .control-group { font-size: 13px; }
            input[type="number"] { width: 45px; }
        }
    </style>
</head>
<body>
    <div class="controls">
        <div class="control-group">
            <select id="mode_val">
                <option value="number">数字</option>
                <option value="hira">かな</option>
            </select>
        </div>
        <div class="control-group"><label>秒:</label><input type="number" id="timer_val" value="3.0" step="0.1"></div>
        <div class="control-group"><label>回:</label><input type="number" id="kaisuu_val" value="10"></div>
        <div class="control-group"><label>種:</label><input type="number" id="shurui_val" value="4" min="1" max="8"></div>
        <button id="start_btn">START</button>
    </div>
    
    <div id="log"></div>
    <div id="display-area">Ready</div>

    <script>
        (function() {
            const SOSUU = [2, 3, 5, 7, 11, 13, 17, 19];
            let isRunning = false;
            let lastNum = null;
            let resolveClick = null;

            const btn = document.getElementById("start_btn");
            const display = document.getElementById("display-area");
            const log = document.getElementById("log");

            function numToHira(n) {
                const map = {0:"", 1:"いち", 2:"に", 3:"さん", 4:"よん", 5:"ご", 6:"ろく", 7:"なな", 8:"はち", 9:"きゅう", 10:"じゅう", 100:"ひゃく", 1000:"せん", 10000:"まん"};
                if (n === 0) return "れい";
                if (n <= 10) return map[n];
                let res = "", temp = n;
                if (temp >= 10000) { let m = Math.floor(temp/10000); res += (m > 1 ? numToHira(m) : "") + map[10000]; temp %= 10000; }
                if (temp >= 1000) { let s = Math.floor(temp/1000); res += (s > 1 ? map[s] : "") + map[1000]; temp %= 1000; }
                if (temp >= 100) { let h = Math.floor(temp/100); res += (h > 1 ? map[h] : "") + map[100]; temp %= 100; }
                if (temp >= 10) { let j = Math.floor(temp/10); res += (j > 1 ? map[j] : "") + map[10]; temp %= 10; }
                if (temp > 0) res += map[temp];
                return res;
            }

            display.addEventListener('pointerdown', (e) => {
                if (resolveClick) {
                    const r = resolveClick;
                    resolveClick = null;
                    r();
                }
            });

            async function start() {
                isRunning = true;
                btn.innerText = "STOP";
                btn.classList.add("running");
                
                const timer = parseFloat(document.getElementById("timer_val").value) || 0;
                const kaisuu = parseInt(document.getElementById("kaisuu_val").value) || 10;
                const shurui = parseInt(document.getElementById("shurui_val").value) || 4;
                const mode = document.getElementById("mode_val").value;

                for (let c = 0; isRunning && (kaisuu === -1 || c < kaisuu); c++) {
                    let num = 1, exps = [];
                    do {
                        num = 1; exps = [];
                        for(let i=0; i<shurui; i++) {
                            let p = Math.floor(Math.random() * 3);
                            exps.push(p);
                            num *= Math.pow(SOSUU[i], p);
                        }
                    } while (num === lastNum || num < 2);
                    lastNum = num;

                    display.innerText = (mode === "hira") ? numToHira(num) : num.toLocaleString();
                    log.innerText = kaisuu === -1 ? (c+1) + "問目" : "残り: " + (kaisuu - c) + "問";

                    if (timer === 0) await new Promise(r => resolveClick = r);
                    else await new Promise(r => setTimeout(r, timer * 1000));

                    if (!isRunning) break;

                    let h = "<tr>", b = "<tr>";
                    for(let i=0; i<shurui; i++) {
                        h += "<th>" + SOSUU[i] + "</th>";
                        b += "<td>" + exps[i] + "</td>";
                    }
                    display.innerHTML = `<table class="ans-table">${h}</tr>${b}</tr></table>`;

                    if (timer === 0) await new Promise(r => resolveClick = r);
                    else await new Promise(r => setTimeout(r, 2000));
                }
                stop();
            }

            function stop() {
                isRunning = false;
                btn.innerText = "START";
                btn.classList.remove("running");
                display.innerText = "Ready";
                log.innerText = "";
            }

            btn.addEventListener('click', () => { if (isRunning) stop(); else start(); });
        })();
    </script>
</body>
</html>
